repos:
  # ── Ruff: lint + format (auto-fix on commit) ─────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── ESLint: static JS (form/panel front-end) ──────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint (static JS)
        entry: pnpm run lint:js
        language: system
        files: ^apps/(form|panel)/static/.*\.js$
        pass_filenames: false

  # ── Secret scanning ───────────────────────────────────────────────────────
  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.5.0
    hooks:
      - id: betterleaks

  # ── General file checks ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        files: ^config\.json-example$
      - id: check-yaml
        # --unsafe allows custom tags (e.g. docker-compose !reset)
        args: [--unsafe]
        files: \.(yml|yaml)$
      - id: end-of-file-fixer
        exclude: \.(svg|png|jpg|ico)$
      - id: trailing-whitespace
        exclude: \.(md|rst)$
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── YAML linting (docker-compose, github workflows) ───────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yml|yaml)$
        args:
          - -d
          - |
            extends: relaxed
            rules:
              line-length:
                max: 120
              truthy: disable
              comments:
                min-spaces-from-content: 1

  # ── Bandit: security lint ─────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: bandit (shared)
        files: ^shared/src/
        args: [-ll]
      - id: bandit
        name: bandit (form)
        files: ^apps/form/src/
        args: [-ll]
      - id: bandit
        name: bandit (panel)
        files: ^apps/panel/src/
        args: [-ll]
      - id: bandit
        name: bandit (router)
        files: ^apps/router/src/
        args: [-ll]
      - id: bandit
        name: bandit (tts)
        files: ^apps/tts/src/
        args: [-ll]

  # ── Mypy + pytest + pip-audit (push stage — matches CI exactly) ───────────
  - repo: local
    hooks:
      - id: mypy-shared
        name: mypy (shared)
        entry: bash -c 'cd shared && uv run python -m mypy src/ --strict'
        language: system
        files: ^shared/
        pass_filenames: false
        stages: [pre-push]

      - id: mypy-form
        name: mypy (form)
        entry: bash -c 'cd apps/form && uv run python -m mypy src/ --strict'
        language: system
        files: ^apps/form/
        pass_filenames: false
        stages: [pre-push]

      - id: mypy-panel
        name: mypy (panel)
        entry: bash -c 'cd apps/panel && uv run python -m mypy src/ --strict'
        language: system
        files: ^(apps/panel/|shared/)
        pass_filenames: false
        stages: [pre-push]

      - id: mypy-router
        name: mypy (router)
        entry: bash -c 'cd apps/router && uv run python -m mypy src/ --strict'
        language: system
        files: ^(apps/router/|shared/)
        pass_filenames: false
        stages: [pre-push]

      - id: mypy-tts
        name: mypy (tts)
        entry: bash -c 'cd apps/tts && uv run python -m mypy src/ --strict'
        language: system
        files: ^apps/tts/
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-shared
        name: pytest (shared)
        entry: bash -c 'cd shared && uv run pytest tests/ -q'
        language: system
        files: ^shared/
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-form
        name: pytest (form)
        entry: bash -c 'cd apps/form && uv run pytest tests/ -q'
        language: system
        files: ^(apps/form/|shared/)
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-panel
        name: pytest (panel)
        entry: bash -c 'cd apps/panel && uv run pytest tests/ -q'
        language: system
        files: ^(apps/panel/|shared/)
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-router
        name: pytest (router)
        entry: bash -c 'cd apps/router && uv run pytest tests/ -q'
        language: system
        files: ^(apps/router/|shared/)
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-tts
        name: pytest (tts)
        entry: bash -c 'cd apps/tts && uv run pytest tests/ -q'
        language: system
        files: ^apps/tts/
        pass_filenames: false
        stages: [pre-push]

      - id: pip-audit-shared
        name: pip-audit (shared)
        entry: bash -c 'cd shared && uv run pip-audit'
        language: system
        files: ^shared/
        pass_filenames: false
        stages: [pre-push]

      - id: pip-audit-form
        name: pip-audit (form)
        entry: bash -c 'cd apps/form && uv run pip-audit'
        language: system
        files: ^apps/form/
        pass_filenames: false
        stages: [pre-push]

      - id: pip-audit-panel
        name: pip-audit (panel)
        entry: bash -c 'cd apps/panel && uv run pip-audit'
        language: system
        files: ^apps/panel/
        pass_filenames: false
        stages: [pre-push]

      - id: pip-audit-router
        name: pip-audit (router)
        entry: bash -c 'cd apps/router && uv run pip-audit'
        language: system
        files: ^apps/router/
        pass_filenames: false
        stages: [pre-push]

      - id: pip-audit-tts
        name: pip-audit (tts)
        entry: bash -c 'cd apps/tts && uv run pip-audit'
        language: system
        files: ^apps/tts/
        pass_filenames: false
        stages: [pre-push]
