version: 2

updates:
  - package-ecosystem: "uv"
    directories:
      - "/shared"
      - "/apps/*"
      - "/tests"
      - "/tests/e2e"
      - "/infra/swagger"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      uv:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directories:
      - "/apps/*"
      - "/infra/swagger"
      - "/infra/mattermost"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      docker:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
