    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/panel
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm run lint:js
        working-directory: .
      - run: uv sync --frozen
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/
      - run: uv run python -m mypy src/ --strict
      - run: uv run bandit -r src/ -ll
      - run: uv run pytest tests/ -q
      - run: uv run pip-audit --skip-editable

  router:
    name: test-router
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/router
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/
      - run: uv run python -m mypy src/ --strict
      - run: uv run bandit -r src/ -ll
      - run: uv run pytest tests/ -q
      - run: uv run pip-audit --skip-editable

  tts:
    name: test-tts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tts
    steps:
      - uses: actions/checkout@v7
