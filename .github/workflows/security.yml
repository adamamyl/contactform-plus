name: Security scan

on:
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks full history scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: pip-audit all services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [shared, apps/form, apps/panel, apps/router, apps/tts, apps/jambonz]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pip-audit
