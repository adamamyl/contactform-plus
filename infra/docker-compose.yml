services:
  caddy:
    image: caddy:2-alpine
    command: caddy run --config /etc/caddy/Caddyfile.local --adapter caddyfile
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
    depends_on:
      - form
      - panel
      - msg-router
    networks:
      contactform:
        aliases:
          - oidc.emf-forms.internal

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: emf_forms
      POSTGRES_USER: emf_forms_admin
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD:-localdev}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    env_file: ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
      - ./postgres/certs:/var/lib/postgresql/certs:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -d emf_forms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contactform

  form:
    build:
      context: ..
      dockerfile: apps/form/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://form_user:${FORM_DB_PASSWORD:-localdev}@postgres/emf_forms
      CONFIG_PATH: /app/config.json
      LOCAL_DEV: "true"
    ports:
      - "${FORM_PORT:-8000}:8000"
    volumes:
      - ../config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contactform

  panel:
    build:
      context: ..
      dockerfile: apps/panel/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://team_member:${TEAM_MEMBER_DB_PASSWORD:-localdev}@postgres/emf_forms
      OIDC_ISSUER: ${OIDC_ISSUER:-http://oidc.emf-forms.internal/default}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-panel}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-secret}
      CONFIG_PATH: /app/config.json
      BASE_URL: ${PANEL_BASE_URL:-https://panel.emf-forms.internal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    volumes:
      - ../config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contactform

  msg-router:
    build:
      context: ..
      dockerfile: apps/router/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://router_user:${ROUTER_DB_PASSWORD:-localdev}@postgres/emf_forms
      CONFIG_PATH: /app/config.json
      LOCAL_DEV: "true"
    volumes:
      - ../config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contactform

  tts:
    build:
      context: ..
      dockerfile: apps/tts/Dockerfile
    networks:
      - contactform

  jambonz-adapter:
    build:
      context: ..
      dockerfile: apps/jambonz/Dockerfile
    env_file: ../.env
    environment:
      CONFIG_PATH: /app/config.json
    ports:
      - "${JAMBONZ_ADAPTER_PORT:-8004}:8004"
    volumes:
      - ../config.json:/app/config.json:ro
    depends_on:
      - msg-router
      - tts
    networks:
      - contactform

  emf-map:
    build:
      context: ${EMF_MAP_PATH:-../../emf/map/web}
      dockerfile: Dockerfile
    profiles:
      - map
      - local
    networks:
      - contactform

  swagger:
    build:
      context: ./swagger
      dockerfile: Dockerfile
    ports:
      - "${SWAGGER_PORT:-8080}:8080"
    profiles:
      - local
      - swagger
    depends_on:
      - form
      - panel
      - msg-router
      - tts
      - jambonz-adapter
    environment:
      FORM_URL: http://form:8000
      PANEL_URL: http://panel:8001
      ROUTER_URL: http://msg-router:8002
      TTS_URL: http://tts:8003
      JAMBONZ_URL: http://jambonz-adapter:8004
    networks:
      - contactform

  mock-oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    environment:
      JSON_CONFIG: '{"interactiveLogin":true,"httpServer":"NettyWrapper","tokenCallbacks":[{"issuerId":"default","requestMappings":[{"requestParam":"client_id","match":"panel","claims":{"groups":["team_conduct"]}}]}]}'
    profiles:
      - local
    networks:
      - contactform

  mattermost:
    build:
      context: ./mattermost
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://emf_forms_admin:${ADMIN_DB_PASSWORD:-localdev}@postgres/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_SERVICESETTINGS_ALLOWEDUNTRUSTEDINTERNALCONNECTIONS: msg-router
    ports:
      - "8065:8065"
    volumes:
      - mattermost_data:/opt/mattermost/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - local
    networks:
      - contactform

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: zap.sh -cmd -autorun /zap/wrk/form-scan.yaml
    volumes:
      - ./zap:/zap/wrk:ro
      - ../reports/zap:/zap/reports
    profiles:
      - zap
    depends_on:
      - form
    networks:
      - contactform

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      MODE: native
    ports:
      - "8080:8080"
    volumes:
      - signal_data:/root/.local/share/signal-cli
    networks:
      - contactform

  clamav:
    image: clamav/clamav:stable
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - clamav_data:/var/lib/clamav
    profiles:
      - clamav
    networks:
      - contactform

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contactform

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - monitoring
    networks:
      - contactform

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring
    networks:
      - contactform

volumes:
  caddy_data:
  pg_data:
  signal_data:
  tts_audio:
  clamav_data:
  prometheus_data:
  grafana_data:
  mattermost_data:

networks:
  contactform:
    driver: bridge
