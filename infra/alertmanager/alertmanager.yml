global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: '${ALERT_EMAIL:-sysadmin@emfcamp.org}'
        from: '${SMTP_FROM:-alerts@emfcamp.org}'
        smarthost: '${SMTP_HOST:-localhost}:${SMTP_PORT:-587}'
        auth_username: '${SMTP_USERNAME:-}'
        auth_password: '${SMTP_PASSWORD:-}'
        require_tls: true
        send_resolved: true
        headers:
          Subject: '[EMF Conduct] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
