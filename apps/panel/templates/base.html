<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EMF Conduct Panel{% endblock %}</title>
  <link rel="stylesheet" href="/static/panel.css">
</head>
<body>
  <header class="site-header">
    <nav class="top-nav">
      <a href="/" class="home-link">&#8962; HOME</a>
      {% if user %}
      <span class="user-info">{{ user.preferred_username or user.email or 'Team member' }}</span>
      <a href="/logout" class="logout-link">Log out</a>
      {% endif %}
    </nav>
  </header>
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
  {% include "footer.html" %}
</body>
</html>
